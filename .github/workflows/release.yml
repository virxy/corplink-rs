name: release

on:
  push:
    branches:
      - master
    tags:
      - "test-release"
      - "[0-9]+\\.[0-9]+\\.[0-9]+"
      - "[0-9]+\\.[0-9]+"

permissions:
  contents: write

jobs:
  build-macos:
    name: build-macos
    runs-on: macos-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: init submodules
        run: |
          set -x
          git submodule status
          git submodule update --init --recursive
          ls -la libwg/wireguard-go/ | head -10
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
      - name: build libwg
        run: cd libwg && ./build.sh
      - name: build package
        run: cargo build --release
      - name: build tarball
        run: |
          mkdir -p target/staging
          cp target/release/corplink-rs target/staging/
          cp corplink-tui install.sh license.txt target/staging/
          chmod +x target/staging/corplink-rs target/staging/corplink-tui target/staging/install.sh
          tar -czf target/corplink-rs-${{ github.ref_name }}-macos-$(uname -m).tar.gz -C target/staging .
      - name: upload package to artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-tarball
          path: target/corplink-rs-*.tar.gz
      - name: publish to release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: target/corplink-rs-*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-windows:
    name: build-windows
    runs-on: windows-latest
    continue-on-error: true  # best-effort; macOS release does not depend on this
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: init submodules
        run: |
          set -x
          git submodule status
          git submodule update --init --recursive
          ls -la libwg/wireguard-go/ | head -10
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
      - name: build libwg
        run: cd libwg && ./build.ps1
      - name: rust install gnu toolchain
        run: rustup toolchain install stable-gnu
      - name: rust use gnu toolchain
        run: rustup default stable-x86_64-pc-windows-gnu
      - name: build package
        run: cargo build --release
      - name: build zip
        run: |
          Move-Item -Path "target/release/corplink-rs.exe" -Destination "."
          Move-Item -Path "config/config.json" -Destination "."
          Compress-Archive -Path corplink-rs.exe,config.json -Destination corplink-rs-${{ github.ref_name }}-windows.zip
      - name: upload package to artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-zip
          path: corplink-rs-${{ github.ref_name }}-windows.zip
      - name: publish to release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: corplink-rs-${{ github.ref_name }}-windows.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
